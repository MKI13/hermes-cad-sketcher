name: check

on:
  pull_request:
  push:
    branches:
      - main
      - 'dev/**'
      - 'review/**'

jobs:
  npm-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests and production build
        run: npm run check

      - name: Locate Chrome for browser smoke
        id: chrome
        uses: browser-actions/setup-chrome@v2

      - name: Run browser smoke against production preview
        run: npm run smoke:browser
        env:
          CHROMIUM_PATH: ${{ steps.chrome.outputs.chrome-path }}
