name: check

on:
  pull_request:
  push:
    branches:
      - main
      - 'dev/**'
      - 'review/**'

jobs:
  npm-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests and production build
        run: npm run check
